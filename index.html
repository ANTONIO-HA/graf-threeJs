<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Introducción a la graficación 3D</title>

    <link rel="icon" type="image/png" href="assets/images/icono.png?v=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            background-color: #101015; /* Fondo muy oscuro */
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; /* Evita barras de desplazamiento */
        }

        /* Estilo para el título superior */
        #ui-header {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            z-index: 10; /* Por encima del canvas */
            pointer-events: none; /* No interfiere con el ratón */
        }
        #ui-header h1 {
            font-weight: 600;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }
        #ui-header p {
            font-weight: 300;
            font-size: 14px;
            opacity: 0.8;
            margin: 5px 0 0 0;
        }

        /* Estilo base para las etiquetas de luz (flotantes) */
        .light-label {
            position: absolute;
            background-color: rgba(20, 20, 25, 0.7); /* Fondo oscuro semitransparente */
            color: #fff;
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 5; /* Por encima del canvas */
            pointer-events: none; /* No interfiere con el ratón */
            transform: translate(-50%, -50%); /* Centra la etiqueta en su posición */
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="ui-header">
        <h1>Introducción a la graficación 3D</h1>
        <p>Figuras y Focos</p>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
